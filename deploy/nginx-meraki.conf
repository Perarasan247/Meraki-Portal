# Meraki Portal — nginx site config for a Hostinger (Ubuntu) VPS.
#
# nginx serves the built React app AND reverse-proxies /api to the FastAPI
# service running on 127.0.0.1:8000. Because everything is one origin
# (merakiailabs.com), there are no CORS issues at all.
#
# Install:
#   sudo cp deploy/nginx-meraki.conf /etc/nginx/sites-available/meraki
#   sudo ln -s /etc/nginx/sites-available/meraki /etc/nginx/sites-enabled/meraki
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
# Then run certbot (see runbook) to add HTTPS automatically.

server {
    listen 80;
    listen [::]:80;
    server_name merakiailabs.com www.merakiailabs.com;

    root /var/www/meraki/frontend/dist;
    index index.html;

    # Don't cap uploads too low — lesson images are posted as data URLs.
    client_max_body_size 12M;

    # API -> FastAPI (uvicorn)
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Long-cache the hashed build assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA deep links: send everything else to index.html so refreshing
    # /app/students (etc.) doesn't 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml;
}
